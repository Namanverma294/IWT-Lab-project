<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4YS Dashboard | Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="profile.html" class="btn-login" style="padding: 0.5rem; margin: 0;">My Profile</a>
                <a href="#" id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <div class="dash-welcome">
            <h1 id="welcomeTitle">4th Year Student Coordinator</h1>
            <p style="color: var(--text-secondary);">Event & OC coordination panel.</p>
        </div>

        <div class="dash-stats">
            <div class="stat-card"><div class="stat-number" id="statMyEvents">0</div><div class="stat-label">My Events</div></div>
            <div class="stat-card"><div class="stat-number" id="statActive">0</div><div class="stat-label">Active</div></div>
            <div class="stat-card"><div class="stat-number" id="statParts">0</div><div class="stat-label">Total Participants</div></div>
        </div>

        <div class="dash-tabs">
            <button class="dash-tab active" data-tab="events">My Events</button>
            <button class="dash-tab" data-tab="create">Create Event</button>
            <button class="dash-tab" data-tab="participants">Participants</button>
        </div>

        <div class="tab-content active" id="tab-events">
            <div class="events-grid" id="ysEventsGrid"><div class="loading-spinner">Loading...</div></div>
        </div>

        <div class="tab-content" id="tab-create">
            <div class="form-container" style="max-width: 600px; margin: 0;">
                <h2 style="margin-bottom: 1.5rem;">Create New Event</h2>
                <div id="createMsg" style="padding: 0.75rem; border-radius: 8px; display: none; margin-bottom: 1rem;"></div>
                <form id="createEventForm">
                    <div class="form-group"><label>Event Name</label><input type="text" id="evName" required placeholder="Event name"></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group"><label>Type</label>
                            <select id="evType" required><option value="Cultural">Cultural</option><option value="Technical">Technical</option><option value="Sports">Sports</option><option value="Workshop">Workshop</option><option value="Hackathon">Hackathon</option><option value="Seminar">Seminar</option></select>
                        </div>
                        <div class="form-group"><label>Venue</label><input type="text" id="evVenue" required placeholder="Main Hall"></div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group"><label>Start Date</label><input type="date" id="evStart" required></div>
                        <div class="form-group"><label>End Date</label><input type="date" id="evEnd" required></div>
                    </div>
                    <div class="form-group"><label>Expected Guests</label><input type="number" id="evGuests" min="0" value="50" required></div>
                    <div class="form-group"><label>Description</label><textarea id="evDesc" rows="3" placeholder="Describe..." style="width:100%; padding:0.75rem; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; color:white; resize:vertical;"></textarea></div>
                    <button type="submit" class="btn-primary form-btn">Create Event</button>
                </form>
            </div>
        </div>

        <div class="tab-content" id="tab-participants">
            <h2 style="margin-bottom: 1rem;">Event Participants</h2>
            <select id="eventSelect" class="dash-select" style="margin-bottom: 1.5rem; width: 100%;"><option value="">Select an event...</option></select>
            <div style="overflow-x: auto;">
                <table class="dash-table">
                    <thead><tr><th>Name</th><th>Email</th><th>Registered</th><th>Status</th></tr></thead>
                    <tbody id="partsBody"><tr><td colspan="4" style="color: var(--text-secondary);">Select an event above</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/events.js"></script>
    <script src="js/services.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const client = initSupabase();
        if (!client) return;
        const authed = await requireAuth(); if (!authed) return;

        const profile = await getUserProfile();
        if (profile) document.getElementById('welcomeTitle').textContent = `Welcome, ${profile.full_name}`;

        document.querySelectorAll('.dash-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        await loadYSData();

        document.getElementById('createEventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.textContent = 'Creating...'; btn.disabled = true;
            const { data, error } = await createEvent({
                name: document.getElementById('evName').value, type: document.getElementById('evType').value,
                startDate: document.getElementById('evStart').value, endDate: document.getElementById('evEnd').value,
                numGuests: parseInt(document.getElementById('evGuests').value), description: document.getElementById('evDesc').value,
                venue: document.getElementById('evVenue').value, status: 'Draft'
            });
            const msg = document.getElementById('createMsg');
            if (error) { msg.textContent = error.message; msg.style.color = '#ff6b6b'; msg.style.background = 'rgba(255,107,107,0.1)'; msg.style.border = '1px solid rgba(255,107,107,0.3)'; }
            else { msg.textContent = '✓ Event created!'; msg.style.color = '#51cf66'; msg.style.background = 'rgba(81,207,102,0.1)'; msg.style.border = '1px solid rgba(81,207,102,0.3)'; e.target.reset(); await loadYSData(); }
            msg.style.display = 'block'; btn.textContent = 'Create Event'; btn.disabled = false;
        });

        document.getElementById('eventSelect').addEventListener('change', async function() {
            if (!this.value) return;
            const parts = await fetchEventParticipants(this.value);
            const tbody = document.getElementById('partsBody');
            if (!parts.length) { tbody.innerHTML = '<tr><td colspan="4">No participants yet</td></tr>'; return; }
            tbody.innerHTML = parts.map(p => `<tr>
                <td>${p.profiles?.full_name || 'N/A'}</td><td>${p.profiles?.email || 'N/A'}</td>
                <td>${new Date(p.registered_at).toLocaleDateString('en-IN')}</td>
                <td><span class="status-badge status-approved">${p.status}</span></td>
            </tr>`).join('');
        });
    });

    async function loadYSData() {
        const events = await fetchMyEvents();
        document.getElementById('statMyEvents').textContent = events.length;
        document.getElementById('statActive').textContent = events.filter(e => ['Published','Approved'].includes(e.status)).length;
        let totalP = 0;
        for (const e of events) totalP += await getParticipantCount(e.id);
        document.getElementById('statParts').textContent = totalP;

        const grid = document.getElementById('ysEventsGrid');
        if (!events.length) { grid.innerHTML = '<div class="no-results"><h3>No events yet</h3></div>'; return; }
        grid.innerHTML = events.map(e => {
            const sc = 'status-' + e.status.toLowerCase().replace('underreview','review');
            return `<div class="event-card" onclick="window.location.href='event-detail.html?id=${e.id}'">
                <div class="event-card-header"><span class="event-tag">${e.type}</span><span class="status-badge ${sc}">${e.status}</span></div>
                <h3 class="event-card-title">${e.name}</h3>
                <div class="event-details"><div class="detail-item">📅 ${new Date(e.start_date).toLocaleDateString('en-IN')}</div><div class="detail-item">📍 ${e.venue||'TBA'}</div></div>
            </div>`;
        }).join('');

        // Populate event select for participants tab
        const sel = document.getElementById('eventSelect');
        sel.innerHTML = '<option value="">Select an event...</option>' + events.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
    }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
