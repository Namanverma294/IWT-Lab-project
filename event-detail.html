<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Detail | Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="#" onclick="history.back()" class="btn-login" style="padding: 0.5rem; margin: 0;">← Back</a>
                <a href="#" id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem; max-width: 900px;">
        <div id="eventContent">
            <div class="loading-spinner">Loading event details...</div>
        </div>
    </main>

    <script src="js/events.js"></script>
    <script src="js/services.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const client = initSupabase();
        if (!client) return;

        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('id');
        if (!eventId) { document.getElementById('eventContent').innerHTML = '<h2>Event not found</h2>'; return; }

        const event = await fetchEventById(eventId);
        if (!event) { document.getElementById('eventContent').innerHTML = '<h2>Event not found</h2>'; return; }

        const participantCount = await getParticipantCount(eventId);
        const session = await getSession();
        const isRegistered = session ? await isRegisteredForEvent(eventId) : false;
        const avgRating = await getAverageRating(eventId);
        const feedbacks = await fetchEventFeedback(eventId);
        const eventServices = await fetchEventServices(eventId);

        document.title = `${event.name} | Campus Connect`;

        const statusColors = {
            Draft: '#94a3b8', UnderReview: '#fbbf24', Approved: '#34d399', Published: '#a855f7', Completed: '#51cf66'
        };

        document.getElementById('eventContent').innerHTML = `
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap;">
                    <span class="event-tag">${event.type}</span>
                    <span class="event-tag" style="background: ${statusColors[event.status]}22; color: ${statusColors[event.status]};">${event.status}</span>
                </div>
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.2;">${event.name}</h1>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                <!-- Left Column -->
                <div>
                    <div class="event-card" style="cursor: default; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 1rem; color: #c4b5fd;">Event Details</h3>
                        <div class="event-details" style="gap: 0.75rem;">
                            <div class="detail-item" style="font-size: 1rem;">📅 <strong>Start:</strong>&nbsp; ${new Date(event.start_date).toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
                            <div class="detail-item" style="font-size: 1rem;">📅 <strong>End:</strong>&nbsp; ${new Date(event.end_date).toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
                            <div class="detail-item" style="font-size: 1rem;">📍 <strong>Venue:</strong>&nbsp; ${event.venue || 'To Be Announced'}</div>
                            <div class="detail-item" style="font-size: 1rem;">👥 <strong>Expected Guests:</strong>&nbsp; ${event.num_guests}</div>
                            <div class="detail-item" style="font-size: 1rem;">📝 <strong>Registered:</strong>&nbsp; ${participantCount} participants</div>
                        </div>
                    </div>

                    ${event.description ? `
                    <div class="event-card" style="cursor: default; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 0.75rem; color: #c4b5fd;">Description</h3>
                        <p style="color: var(--text-secondary); line-height: 1.7;">${event.description}</p>
                    </div>` : ''}

                    ${eventServices.length ? `
                    <div class="event-card" style="cursor: default; margin-bottom: 1.5rem;">
                        <h3 style="margin-bottom: 1rem; color: #c4b5fd;">Services</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                            ${eventServices.map(es => `
                                <div style="background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); padding: 0.75rem 1rem; border-radius: 8px;">
                                    <strong style="color: white;">${es.services?.name || 'Service'}</strong>
                                    <div style="color: var(--text-secondary); font-size: 0.85rem;">${es.services?.service_type} • ${es.services?.phone}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    ${feedbacks.length ? `
                    <div class="event-card" style="cursor: default;">
                        <h3 style="margin-bottom: 1rem; color: #c4b5fd;">Feedback (${feedbacks.length} reviews • ⭐ ${avgRating}/5)</h3>
                        ${feedbacks.map(f => `
                            <div style="border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.75rem;">
                                <div style="display: flex; justify-content: space-between;">
                                    <strong>${f.profiles?.full_name || 'Anonymous'}</strong>
                                    <span style="color: #fbbf24;">${'⭐'.repeat(f.rating)}</span>
                                </div>
                                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">${f.comments || ''}</p>
                                <span style="color: var(--text-secondary); font-size: 0.75rem;">${new Date(f.submitted_at).toLocaleDateString('en-IN')}</span>
                            </div>
                        `).join('')}
                    </div>` : ''}
                </div>

                <!-- Right Column (Action Panel) -->
                <div>
                    <div class="event-card" style="cursor: default; position: sticky; top: 6rem;">
                        <h3 style="margin-bottom: 1rem; text-align: center;">Join This Event</h3>
                        <div style="text-align: center; margin-bottom: 1rem;">
                            <div style="font-size: 3rem; font-weight: 800; color: #a855f7;">${participantCount}</div>
                            <div style="color: var(--text-secondary);">Registered</div>
                        </div>
                        ${session ? (isRegistered ? 
                            `<button class="register-btn" style="width: 100%; padding: 0.85rem; font-size: 1rem; background: rgba(81,207,102,0.2); color: #51cf66;" disabled>✓ Already Registered</button>
                             <button class="register-btn" style="width: 100%; padding: 0.85rem; font-size: 0.9rem; margin-top: 0.75rem; background: rgba(255,107,107,0.2); color: #ff6b6b;" onclick="cancelReg()">Cancel Registration</button>` 
                            : `<button class="register-btn" style="width: 100%; padding: 0.85rem; font-size: 1rem;" onclick="handleReg(this)" id="regBtn">Register Now</button>`)
                            : `<a href="signup.html" class="register-btn" style="display: block; width: 100%; padding: 0.85rem; font-size: 1rem; text-align: center; text-decoration: none;">Sign Up to Register</a>`
                        }
                    </div>
                </div>
            </div>
        `;
    });

    async function handleReg(btn) {
        btn.textContent = 'Registering...'; btn.disabled = true;
        const eventId = new URLSearchParams(window.location.search).get('id');
        const { error } = await registerForEvent(eventId);
        if (error) { btn.textContent = 'Error: ' + error.message; }
        else { location.reload(); }
    }
    async function cancelReg() {
        if (!confirm('Cancel your registration?')) return;
        const eventId = new URLSearchParams(window.location.search).get('id');
        await cancelRegistration(eventId);
        location.reload();
    }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
