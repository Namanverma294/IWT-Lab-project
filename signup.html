<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Campus Connect</title>
    <meta name="description" content="Create your Campus Connect account to discover and participate in college events.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                </div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="login.html" class="btn-login" style="padding: 0.5rem; margin: 0;">Log in</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <div class="form-container" style="max-width: 500px; margin: 2rem auto;">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Create Account</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem;">Join Campus Connect to discover and manage campus events</p>
            
            <div id="signupError" style="color: #ff6b6b; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); padding: 0.75rem 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem; display: none; font-size: 0.9rem;"></div>
            <div id="signupSuccess" style="color: #51cf66; background: rgba(81,207,102,0.1); border: 1px solid rgba(81,207,102,0.3); padding: 0.75rem 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem; display: none; font-size: 0.9rem;"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">College Email Address</label>
                    <input type="email" id="email" required placeholder="student@college.edu">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+91 98765 43210">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6">
                </div>

                <div class="form-group">
                    <label for="role">Registration Type</label>
                    <select id="role" required>
                        <option value="participant">Participant (Student)</option>
                        <option value="oc">OC Member (Organizing Committee)</option>
                        <option value="poc">POC (Point of Contact)</option>
                        <option value="organizer">Event Organizer</option>
                        <option value="faculty_advisor">Faculty Advisor</option>
                        <option value="4ys">4th Year Student Coordinator</option>
                    </select>
                </div>

                <div class="form-group" id="inviteCodeGroup" style="display: none;">
                    <label for="inviteCode">Invite Code (Required for internal roles)</label>
                    <input type="text" id="inviteCode" placeholder="Enter your invite code">
                </div>
                
                <button type="submit" class="btn-primary form-btn">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                Already have an account? <a href="login.html" style="color: var(--accent-primary);">Log In here</a>
            </p>
        </div>
    </main>

    <script>
        // Show/hide invite code field based on role
        document.getElementById('role').addEventListener('change', function() {
            const inviteGroup = document.getElementById('inviteCodeGroup');
            inviteGroup.style.display = this.value !== 'participant' ? 'block' : 'none';
        });
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
