<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Advisor Dashboard | Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    </head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="profile.html" class="btn-login" style="padding: 0.5rem; margin: 0;">My Profile</a>
                <a href="api/auth/logout" id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <div class="dash-welcome">
            <h1 id="welcomeTitle">Faculty Advisor Dashboard</h1>
            <p style="color: var(--text-secondary);">Oversight & approvals — Review events, budgets, and feedback.</p>
        </div>

        <div class="dash-stats">
            <div class="stat-card"><div class="stat-number" id="statPending">0</div><div class="stat-label">Pending Review</div></div>
            <div class="stat-card"><div class="stat-number" id="statApproved">0</div><div class="stat-label">Approved</div></div>
            <div class="stat-card"><div class="stat-number" id="statAll">0</div><div class="stat-label">Total Events</div></div>
        </div>

        <div class="dash-tabs">
            <button class="dash-tab active" data-tab="review">Pending Review</button>
            <button class="dash-tab" data-tab="allevents">All Events</button>
            <button class="dash-tab" data-tab="feedback">Feedback Overview</button>
        </div>

        <div class="tab-content active" id="tab-review">
            <div class="events-grid" id="reviewGrid"><div class="loading-spinner">Loading...</div></div>
        </div>

        <div class="tab-content" id="tab-allevents">
            <div style="overflow-x: auto;">
                <table class="dash-table">
                    <thead><tr><th>Event</th><th>Type</th><th>Date</th><th>Status</th><th>Participants</th></tr></thead>
                    <tbody id="allEventsBody"><tr><td colspan="5" class="loading-spinner">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="tab-content" id="tab-feedback">
            <div class="events-grid" id="fbGrid"><div class="loading-spinner">Loading...</div></div>
        </div>
    </main>

    <script src="js/events.js"></script>
    <script src="js/services.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        document.querySelectorAll('.dash-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        await loadAll();
    });

    async function loadAll() {
        const events = await fetchPublishedEvents();
        const pending = events.filter(e => e.status === 'UnderReview');
        const approved = events.filter(e => e.status === 'Approved' || e.status === 'Published');

        document.getElementById('statPending').textContent = pending.length;
        document.getElementById('statApproved').textContent = approved.length;
        document.getElementById('statAll').textContent = events.length;

        // Pending Review
        const reviewGrid = document.getElementById('reviewGrid');
        if (!pending.length) {
            reviewGrid.innerHTML = '<div class="no-results"><h3>No events pending review</h3><p>All clear! ✓</p></div>';
        } else {
            reviewGrid.innerHTML = pending.map(e => `
                <div class="event-card" style="cursor: default;">
                    <div class="event-card-header">
                        <span class="event-tag">${e.type}</span>
                        <span class="status-badge status-review">Under Review</span>
                    </div>
                    <h3 class="event-card-title">${e.name}</h3>
                    <div class="event-details">
                        <div class="detail-item">📅 ${new Date(e.start_date).toLocaleDateString('en-IN')} — ${new Date(e.end_date).toLocaleDateString('en-IN')}</div>
                        <div class="detail-item">📍 ${e.venue || 'TBA'}</div>
                        <div class="detail-item">👥 ${e.num_guests} expected guests</div>
                    </div>
                    ${e.description ? `<p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0.75rem 0; line-height: 1.5;">${e.description}</p>` : ''}
                    <div class="event-actions" style="gap: 0.75rem;">
                        <button class="register-btn" style="flex: 1;" onclick="approveEvent('${e.id}')">✓ Approve</button>
                        <button class="register-btn" style="flex: 1; background: rgba(255,107,107,0.2); color: #ff6b6b;" onclick="flagEvent('${e.id}')">⚠ Flag / Reject</button>
                    </div>
                </div>
            `).join('');
        }

        // All Events Table
        const tbody = document.getElementById('allEventsBody');
        tbody.innerHTML = events.map(e => {
            const sc = 'status-' + e.status.toLowerCase().replace('underreview', 'review');
            return `<tr onclick="window.location.href='event-detail.html?id=${e.id}'" style="cursor:pointer;">
                <td><strong>${e.name}</strong></td>
                <td>${e.type}</td>
                <td>${new Date(e.start_date).toLocaleDateString('en-IN')}</td>
                <td><span class="status-badge ${sc}">${e.status}</span></td>
                <td>${e.num_guests}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="5">No events</td></tr>';

        // Feedback
        const fbGrid = document.getElementById('fbGrid');
        const completed = events.filter(e => e.status === 'Completed');
        if (!completed.length) {
            fbGrid.innerHTML = '<div class="no-results"><h3>No completed events yet</h3></div>';
        } else {
            let html = '';
            for (const ev of completed) {
                const fb = await fetchEventFeedback(ev.id);
                const avg = await getAverageRating(ev.id);
                html += `<div class="event-card" style="cursor:default;">
                    <h3 class="event-card-title">${ev.name}</h3>
                    <div style="color:#fbbf24; font-size:1.1rem; margin:0.5rem 0;">⭐ ${avg}/5 (${fb.length} reviews)</div>
                    ${fb.slice(0, 3).map(f => `<div style="border-top:1px solid var(--border); padding-top:0.5rem; margin-top:0.5rem;">
                        <span style="color:white;">${f.profiles?.full_name || 'Anonymous'}</span> — <span style="color:#fbbf24;">${'⭐'.repeat(f.rating)}</span>
                        <p style="color:var(--text-secondary); font-size:0.85rem;">${f.comments || ''}</p>
                    </div>`).join('')}
                </div>`;
            }
            fbGrid.innerHTML = html;
        }
    }

    async function approveEvent(id) {
        await updateEvent(id, { status: 'Approved' });
        await loadAll();
    }
    async function flagEvent(id) {
        const reason = prompt('Reason for flagging/rejecting:');
        if (reason !== null) {
            await updateEvent(id, { status: 'Draft' });
            await loadAll();
        }
    }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
