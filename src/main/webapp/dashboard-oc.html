<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC Dashboard | Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    </head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="profile.html" class="btn-login" style="padding: 0.5rem; margin: 0;">My Profile</a>
                <a href="api/auth/logout" id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <div class="dash-welcome">
            <h1 id="welcomeTitle">OC Member Dashboard</h1>
            <p style="color: var(--text-secondary);">Domain tasks & event coordination</p>
        </div>

        <div class="event-card" style="cursor: default; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem; color: #c4b5fd;">My Domains</h3>
            <div id="myDomains" style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                <div class="loading-spinner" style="padding: 1rem;">Loading...</div>
            </div>
            <div style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                <h4 style="margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--text-secondary);">Add / Update Domains</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;" id="domainCheckboxes">
                </div>
                <button onclick="saveDomains()" class="register-btn" style="margin-top: 1rem; font-size: 0.85rem;">Save Domains</button>
            </div>
        </div>

        <div class="dash-tabs">
            <button class="dash-tab active" data-tab="events">All Events</button>
            <button class="dash-tab" data-tab="services">Services (My Domain)</button>
        </div>

        <div class="tab-content active" id="tab-events">
            <div class="events-grid" id="ocEventsGrid"><div class="loading-spinner">Loading...</div></div>
        </div>

        <div class="tab-content" id="tab-services">
            <div class="events-grid" id="ocServicesGrid"><div class="loading-spinner">Loading...</div></div>
        </div>
    </main>

    <script src="js/events.js"></script>
    <script src="js/services.js"></script>
    <script>
    const ALL_DOMAINS = ['Logistics', 'MediaProduction', 'Creative', 'PR', 'Content', 'Sponsorship', 'SocialMedia', 'Graphics', 'Technical'];
    const DOMAIN_ICONS = { Logistics: '📦', MediaProduction: '📷', Creative: '🎨', PR: '📣', Content: '📝', Sponsorship: '💰', SocialMedia: '📱', Graphics: '🖼️', Technical: '💻' };
    let currentDomains = [];

    document.addEventListener('DOMContentLoaded', async () => {
        document.querySelectorAll('.dash-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        await loadOCData();
    });

    async function loadOCData() {
        currentDomains = [];
        const domainsDiv = document.getElementById('myDomains');
        domainsDiv.innerHTML = '<p style="color: var(--text-secondary);">No domains selected yet. Choose your domains below.</p>';

        document.getElementById('domainCheckboxes').innerHTML = ALL_DOMAINS.map(d => `
            <label style="display: flex; align-items: center; gap: 0.4rem; background: var(--bg-card); border: 1px solid var(--border); padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: white;">
                <input type="checkbox" value="${d}" style="accent-color: #a855f7;">
                ${DOMAIN_ICONS[d]} ${d}
            </label>
        `).join('');

        const events = await fetchPublishedEvents();
        const grid = document.getElementById('ocEventsGrid');
        if (!events.length) { grid.innerHTML = '<div class="no-results"><h3>No events</h3></div>'; }
        else {
            grid.innerHTML = events.map(e => `
                <div class="event-card" onclick="window.location.href='event-detail.html?id=${e.id}'">
                    <div class="event-card-header"><span class="event-tag">${e.type}</span></div>
                    <h3 class="event-card-title">${e.name}</h3>
                    <div class="event-details">
                        <div class="detail-item">📅 ${new Date(e.start_date).toLocaleDateString('en-IN')}</div>
                        <div class="detail-item">📍 ${e.venue || 'TBA'}</div>
                    </div>
                </div>
            `).join('');
        }

        const sGrid = document.getElementById('ocServicesGrid');
        sGrid.innerHTML = '<div class="no-results"><h3>Connect to backend to view services</h3></div>';
    }

    async function saveDomains() {
        alert('Domain saving requires active Java session. Please log in first.');
    }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
