<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    </head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                </div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="profile.html" class="btn-login" style="padding: 0.5rem; margin: 0;">My Profile</a>
                <a href="api/auth/logout" id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Sign Out</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        
        <div class="dash-welcome">
            <h1 id="welcomeTitle">Welcome back!</h1>
            <p id="welcomeSubtitle" style="color: var(--text-secondary);">Browse upcoming events and manage your registrations.</p>
        </div>

        <div class="dash-stats">
            <div class="stat-card">
                <div class="stat-number" id="statAvailable">0</div>
                <div class="stat-label">Available Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statRegistered">0</div>
                <div class="stat-label">My Registrations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statCompleted">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="dash-tabs">
            <button class="dash-tab active" data-tab="browse">Browse Events</button>
            <button class="dash-tab" data-tab="myevents">My Events</button>
            <button class="dash-tab" data-tab="feedback">Give Feedback</button>
        </div>

        <div class="tab-content active" id="tab-browse">
            <div class="dash-filters">
                <input type="text" id="searchEvents" placeholder="Search events..." class="dash-search">
                <select id="filterType" class="dash-select">
                    <option value="all">All Types</option>
                    <option value="Cultural">Cultural</option>
                    <option value="Technical">Technical</option>
                    <option value="Sports">Sports</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Hackathon">Hackathon</option>
                    <option value="Seminar">Seminar</option>
                </select>
            </div>
            <div class="events-grid" id="browseGrid">
                <div class="loading-spinner">Loading events...</div>
            </div>
        </div>

        <div class="tab-content" id="tab-myevents">
            <div class="events-grid" id="myEventsGrid">
                <div class="loading-spinner">Loading your events...</div>
            </div>
        </div>

        <div class="tab-content" id="tab-feedback">
            <div class="events-grid" id="feedbackGrid">
                <div class="loading-spinner">Loading completed events...</div>
            </div>
        </div>
    </main>

    <script src="js/events.js"></script>
    <script src="js/services.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Tab switching
        document.querySelectorAll('.dash-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Load browse events
        await loadBrowseEvents();
        await loadMyEvents();
        await loadFeedbackEvents();
        await loadStats();

        // Search & filter
        document.getElementById('searchEvents').addEventListener('input', loadBrowseEvents);
        document.getElementById('filterType').addEventListener('change', loadBrowseEvents);
    });

    async function loadStats() {
        const events = await fetchPublishedEvents();
        const regs = await fetchMyRegistrations();
        document.getElementById('statAvailable').textContent = events.length;
        document.getElementById('statRegistered').textContent = regs.length;
        document.getElementById('statCompleted').textContent = regs.filter(r => r.status === 'Completed').length;
    }

    async function loadBrowseEvents() {
        const grid = document.getElementById('browseGrid');
        const search = document.getElementById('searchEvents').value.toLowerCase();
        const typeFilter = document.getElementById('filterType').value;

        let events = await fetchPublishedEvents();

        if (search) events = events.filter(e => e.name.toLowerCase().includes(search));
        if (typeFilter !== 'all') events = events.filter(e => e.type === typeFilter);

        if (!events.length) {
            grid.innerHTML = '<div class="no-results"><h3>No events found</h3><p>Check back later for upcoming events!</p></div>';
            return;
        }

        grid.innerHTML = events.map(e => `
            <div class="event-card" onclick="window.location.href='event-detail.html?id=${e.id}'">
                <div class="event-card-header">
                    <span class="event-tag">${e.type}</span>
                    <span class="event-tag" style="background: rgba(139,92,246,0.2); color: #c4b5fd;">${e.status}</span>
                </div>
                <h3 class="event-card-title">${e.name}</h3>
                <div class="event-details">
                    <div class="detail-item">📅 ${new Date(e.startDate).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</div>
                    <div class="detail-item">📍 ${e.venue || 'TBA'}</div>
                    <div class="detail-item">👥 ${e.noOfGuests} expected</div>
                </div>
                <div class="event-actions">
                    <button class="register-btn" onclick="event.stopPropagation(); handleRegister('${e.id}', this)">Register</button>
                </div>
            </div>
        `).join('');
    }

    async function loadMyEvents() {
        const grid = document.getElementById('myEventsGrid');
        const regs = await fetchMyRegistrations();

        if (!regs.length) {
            grid.innerHTML = '<div class="no-results"><h3>No registrations yet</h3><p>Browse events and register to see them here.</p></div>';
            return;
        }

        grid.innerHTML = regs.map(r => `
            <div class="event-card">
                <div class="event-card-header">
                    <span class="event-tag">${r.type || 'Event'}</span>
                    <span class="event-tag" style="background: rgba(81,207,102,0.2); color: #51cf66;">Registered</span>
                </div>
                <h3 class="event-card-title">${r.name}</h3>
                <div class="event-details">
                    <div class="detail-item">📅 ${new Date(r.startDate).toLocaleDateString('en-IN')}</div>
                    <div class="detail-item">📍 ${r.venue || 'TBA'}</div>
                </div>
                <div class="event-actions">
                    <button class="register-btn" style="background: rgba(255,107,107,0.2); color: #ff6b6b;" onclick="handleCancel('${r.id}', this)">Cancel</button>
                </div>
            </div>
        `).join('');
    }

    async function loadFeedbackEvents() {
        const grid = document.getElementById('feedbackGrid');
        grid.innerHTML = '<div class="no-results"><h3>No completed events yet</h3><p>Feedback will be available after events you attended are completed.</p></div>';
    }

    async function handleRegister(eventId, btn) {
        btn.textContent = 'Registering...';
        btn.disabled = true;
        const result = await registerForEvent(eventId);
        if (result.success) {
            btn.textContent = '✓ Registered!';
            btn.style.background = 'rgba(81,207,102,0.2)';
            btn.style.color = '#51cf66';
            await loadStats();
        } else {
            btn.textContent = result.message || 'Error';
            btn.style.background = 'rgba(255,107,107,0.2)';
            btn.style.color = '#ff6b6b';
        }
    }

    async function handleCancel(eventId, btn) {
        if (!confirm('Cancel your registration?')) return;
        btn.textContent = 'Cancelling...';
        const result = await cancelRegistration(eventId);
        if (result.success) {
            await loadMyEvents();
            await loadStats();
        }
    }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
