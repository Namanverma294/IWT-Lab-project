<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Campus Connect</title>
    <meta name="description" content="Sign in to your Campus Connect account.">
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>
    <div class="bg-gradient"></div>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                </div>
                <span style="background: linear-gradient(90deg, #d8b4fe, #a855f7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px;">Campus Connect</span>
            </a>
            <div class="auth-buttons" style="display: flex; gap: 1rem; align-items: center;">
                <a href="signup.html" class="btn-primary">Sign up</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <div class="form-container" style="max-width: 450px; margin: 2rem auto;">
            
            <div id="signupSuccessBanner" style="color: #51cf66; background: rgba(81,207,102,0.1); border: 1px solid rgba(81,207,102,0.3); padding: 0.75rem 1rem; border-radius: 8px; text-align: center; margin-bottom: 1.5rem; display: none; font-size: 0.9rem;">
                ✓ Account created successfully. Please log in.
            </div>

            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Welcome Back</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem;">Sign in to your Campus Connect account</p>
            
            <div id="loginError" style="color: #ff6b6b; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); padding: 0.75rem 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem; display: none; font-size: 0.9rem;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="modal-email">Email Address</label>
                    <input type="email" id="modal-email" required placeholder="student@college.edu">
                </div>
                
                <div class="form-group">
                    <label for="modal-password">Password</label>
                    <input type="password" id="modal-password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary form-btn">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                Don't have an account? <a href="signup.html" style="color: var(--accent-primary);">Create one here</a>
            </p>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script>
        // PRD Bug Fix #8.1: Show success banner when redirected from signup
        const params = new URLSearchParams(window.location.search);
        if (params.get('signup') === 'success') {
            const banner = document.getElementById('signupSuccessBanner');
            if (banner) banner.style.display = 'block';
        }
    </script>
</body>
</html>
